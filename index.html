<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambassador Connect — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-logo">
        <span class="logo-icon">⬡</span>
      </div>
      <h1 class="brand-name">Ambassador<br /><em>Connect</em></h1>
      <p class="brand-tagline">Internal Relationship Portal</p>
    </div>

    <div class="auth-card" id="loginCard">
      <div class="auth-card-header">
        <h2>Welcome back</h2>
        <p>Sign in to your account</p>
      </div>
      <div id="authError" class="alert alert-error" style="display:none"></div>
      <div id="authSuccess" class="alert alert-success" style="display:none"></div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="loginEmail" placeholder="you@company.com" class="form-input" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" class="form-input" />
      </div>
      <button class="btn btn-primary btn-full" id="loginBtn" onclick="handleLogin()">
        <span>Sign In</span>
      </button>
    </div>

    <div class="auth-card" id="signupCard" style="display:none">
      <div class="auth-card-header">
        <h2>Create account</h2>
        <p>New sales member signup</p>
      </div>
      <div id="signupError" class="alert alert-error" style="display:none"></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Jane Smith" class="form-input" />
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="signupEmail" placeholder="you@company.com" class="form-input" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min. 8 characters" class="form-input" />
      </div>
      <button class="btn btn-primary btn-full" id="signupBtn" onclick="handleSignup()">
        <span>Create Account</span>
      </button>
      <p class="auth-switch">Already have an account? <a href="#" onclick="toggleAuthMode('login')">Sign in</a></p>
    </div>

    <div class="auth-decoration">
      <div class="deco-circle c1"></div>
      <div class="deco-circle c2"></div>
      <div class="deco-circle c3"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
